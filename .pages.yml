media:
  input: images
  output: /images

content:
  - name: blogs
    label: Blog Posts
    path: content/blogs
    type: collection
    fields:
      - { name: title,  label: Title,   type: string }
      - { name: date,   label: Date,    type: date }
      - { name: body,   label: Content, type: rich-text }

  - name: photos
    label: Photos
    path: content/photos
    type: collection
    fields:
      - { name: title,   label: Title,   type: string }
      - { name: image,   label: Photo,   type: image }
      - { name: caption, label: Caption, type: string }
